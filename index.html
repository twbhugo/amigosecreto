<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Amigo Secreto — aplicação simples" />
    <title>Amigo Secreto</title>

    <!-- Fallback safe defaults -->
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* Minimal reset + layout for quick start */
        html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;}
        .wrap{min-height:100%;display:flex;flex-direction:column}
        header,footer{padding:1rem;background:#f5f5f5}
        main{flex:1;padding:1rem}
        .container{max-width:900px;margin:0 auto;width:100%}
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div class="container">
                <h1>Amigo Secreto</h1>
            </div>
        </header>

        <main>
            <div class="container">
                <p>Bienvenido</p>

                <!-- Example structure -->
                <section id="app">
                    <!-- form, list, etc. go here -->
                </section>
            </div>
        </main>

        <footer>
            <div class="container">
                <small>&copy; <span id="year"></span> Amigo Secreto</small>
            </div>
        </footer>
    </div>

    <script>
        // Minimal JS boot
        document.getElementById('year').textContent = new Date().getFullYear();
        // Add your scripts in main.js or inline here
    </script>
    <script src="main.js" defer></script>
</body>
</html>
